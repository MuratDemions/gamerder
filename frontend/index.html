<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Neon Match</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            neon: {
              purple: '#BF00FF',
              dark: '#A020F0',
              light: '#D866FF'
            },
            pitch: {
              black: '#050505',
              darker: '#000000',
              gray: '#111111'
            }
          },
          boxShadow: {
            'neon': '0 0 10px rgba(191, 0, 255, 0.5), 0 0 20px rgba(191, 0, 255, 0.3)',
            'neon-strong': '0 0 15px rgba(191, 0, 255, 0.8), 0 0 30px rgba(191, 0, 255, 0.5)',
            'neon-inner': 'inset 0 0 10px rgba(191, 0, 255, 0.3)'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    /* Custom scrollbar for neon theme */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #050505;
    }
    ::-webkit-scrollbar-thumb {
      background: #A020F0;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #BF00FF;
    }
  </style>
  </head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
